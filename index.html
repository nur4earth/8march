<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>8 Наурыз</title>
<style>
body {
    background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
    color: #4b0082;
    font-family: 'Courier New', monospace;
    font-size: 24px;
    padding: 40px;
    overflow: hidden;
}

/* Қосымша мерекелік эффект: ұсақ гүлшешектер */
.flower {
    position: absolute;
    font-size: 24px;
    animation: float 5s linear infinite;
}

@keyframes float {
    0% { transform: translateY(0) rotate(0deg); opacity:1; }
    50% { transform: translateY(-200px) rotate(180deg); opacity:0.7; }
    100% { transform: translateY(0) rotate(360deg); opacity:1; }
}

#text {
    position: relative;
    z-index: 10;
}
</style>
</head>
<body>
<div id="text"></div>

<script>
const params = new URLSearchParams(window.location.search);
const name = params.get("name") || "Student";

const lines = [
`Initializing AI...`,
`Scanning student...`,
`Student detected`,
`Name: ${name}`,
"",
`🌸 ${name}, 8 Наурыз құтты болсын!`,
`— Дастан ағай`
];

let i = 0;
function showLine(){
    if(i < lines.length){
        const textDiv = document.getElementById("text");
        const span = document.createElement("span");
        span.innerHTML = lines[i] + "<br>";
        // әр жолды кездейсоқ түс беру
        const colors = ["#ff1493", "#ff4500", "#32cd32", "#1e90ff", "#ff69b4"];
        span.style.color = colors[Math.floor(Math.random() * colors.length)];
        textDiv.appendChild(span);
        i++;
        setTimeout(showLine,1000);
    }
}
showLine();

// Кішкентай гүлшешектерді экранға шығару
function createFlower(){
    const flower = document.createElement("div");
    flower.className = "flower";
    flower.style.left = Math.random() * window.innerWidth + "px";
    flower.style.top = window.innerHeight + "px";
    flower.innerHTML = "🌸"; // гүлшешек эмодзи
    document.body.appendChild(flower);
    setTimeout(() => flower.remove(), 5000);
}
setInterval(createFlower, 300);
</script>

</body>
</html>
